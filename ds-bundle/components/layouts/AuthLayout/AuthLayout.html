<!-- @dsCard group="Layouts" name="AuthLayout" viewport="{\"width\":500,\"height\":600}" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AuthLayout</title>
  <link rel="stylesheet" href="../../../styles.css" />
</head>
<body style="margin: 0;">
  <div class="auth-layout">
    <div class="auth-card">
      <h1 class="auth-card-title">Welcome back</h1>
      <p class="auth-card-subtitle">Sign in to your account</p>
      <div class="form-field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" />
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <button style="width: 100%; padding: 12px; margin-top: 16px; background: var(--accent-grad); color: white; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: box-shadow var(--t-fast);">Sign in</button>
      <div class="auth-card-footer">
        No account? <a href="#">Create one</a>
      </div>
    </div>
  </div>
</body>
</html>
