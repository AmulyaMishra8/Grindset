services:
  # ── Single service: SPA + gateway + auth + judge + user in one container ─────
  # The gateway binds Render's PORT, serves the built React SPA from apps/web/dist
  # (same origin → first-party cookies, works in Brave/Safari), and proxies API
  # routes to the other three processes over localhost (see scripts/start-all.js).
  # One service, one origin, one thing to keep warm.
  - type: web
    name: grindset-gateway
    runtime: node
    plan: free
    buildCommand: >-
      npx --yes pnpm@9 install --frozen-lockfile --prod=false
      --filter @grindset/api-gateway... --filter @grindset/auth-service...
      --filter @grindset/judge-service... --filter @grindset/user-service...
      --filter @grindset/web... &&
      npx --yes pnpm@9
      --filter @grindset/api-gateway... --filter @grindset/auth-service...
      --filter @grindset/judge-service... --filter @grindset/user-service...
      --filter @grindset/web... build
    startCommand: node scripts/start-all.js
    envVars:
      - key: NODE_ENV
        value: production
      # Internal wiring: the gateway proxies to the sibling processes on localhost.
      - key: AUTH_SERVICE_URL
        value: http://localhost:4003
      - key: JUDGE_SERVICE_URL
        value: http://localhost:4002
      - key: USER_SERVICE_URL
        value: http://localhost:4001
      - key: COOKIE_SECURE
        value: "true"
      # ── Shared ──
      - key: WEB_ORIGIN
        sync: false  # Now the SAME as this service's URL (SPA is served here), e.g. https://grindset-gateway.onrender.com
      - key: APP_URL
        sync: false  # This service's own URL (used in OAuth redirect + email links)
      # ── Auth (Supabase) ──
      - key: DATABASE_URL
        sync: false  # Supabase session-pooler URL
      - key: REDIS_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false  # RSA private key PEM (single line, newlines as \n)
      - key: JWT_PUBLIC_KEY
        sync: false  # RSA public key PEM (single line, newlines as \n)
      - key: JWT_ISSUER
        sync: false
      - key: JWT_AUDIENCE
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # ── Judge (Neon) ──
      - key: DATABASE
        sync: false  # Neon pooled URL
      - key: FIRST_GROQ_KEY
        sync: false
      - key: SECOND_GROQ_KEY
        sync: false
      - key: THIRD_GROQ_KEY
        sync: false
      - key: MISTRAL_KEY
        sync: false
